<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NJIT Empty Rooms</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>

  <header>
    <div class="header-inner">
      <div class="brand">
        <span class="brand-dot" aria-hidden="true"></span>
        <span class="brand-name">NJIT ROOMS</span>
      </div>
      <div class="clock" id="clock" aria-live="off">--:--:--</div>
    </div>
    <div class="header-status" id="status" aria-live="polite"></div>
  </header>

  <main>
    <div class="filter-bar" role="toolbar" aria-label="Filter by building">
      <div class="filter-chips" id="building-filter">
        <button class="chip active" data-value="" aria-pressed="true">ALL</button>
      </div>
    </div>

    <div class="rooms" id="rooms-container" aria-label="Available rooms">
      <div class="loading" aria-live="polite">
        <span class="loading-dot" aria-hidden="true"></span>
        <span>Scanning campus&hellip;</span>
      </div>
    </div>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
